{% extends "base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'users/css/auth.css' %}">

<div class="auth-page">
    <main class="site-main">

        <div class="auth-card">

            <!-- Logo -->
           <div class="auth-logo">
        <div class="auth-logo__icon" aria-hidden="true">
            <i class="fa-solid fa-screwdriver-wrench"></i>
        </div>
        <span class="auth-logo__wordmark">Rent<span>ora</span></span>
    </div>

            <!-- Title -->
            <div class="auth-panel auth-panel--active">

                <h2 class="auth-panel__title">
                    Forgot Your Password?
                </h2>

                <p class="auth-panel__subtitle">
                    No worries — enter your email and we’ll send you a reset link
                </p>

                <!-- Success Message -->
                {% if sent %}
                <div class="auth-flashes">
                    <div class="auth-flash auth-flash--success">
                        ✔ If an account exists, a reset link has been sent
                    </div>
                </div>
                {% endif %}

                <!-- Form -->
                <form method="POST" class="auth-form">
                    {% csrf_token %}

                    <div class="field">
                        <label class="field__label">Email Address</label>

                        <div class="field__control">
                            <span class="field__icon">✉</span>

                            <input
                                type="email"
                                name="email"
                                class="field__input"
                                placeholder="you@example.com"
                                required
                            >
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">
                        Send Reset Link
                    </button>

                </form>

                <!-- Back -->
                <div class="auth-switch">
                    <a href="{% url 'users:login' %}" class="auth-switch__link">
                        ← Back to Login
                    </a>
                </div>

            </div>

        </div>

    </main>
</div>

{% endblock %}

{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'users/css/auth.css' %}">

<div class="auth-page">
    <main class="site-main">
        <div class="auth-card">

            <div class="auth-logo">
                <div class="auth-logo__icon" aria-hidden="true">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                </div>
                <span class="auth-logo__wordmark">Rent<span>ora</span></span>
            </div>

            <div class="auth-panel auth-panel--active auth-panel--center">
                
                <div class="email-success-icon">
                    <i class="fa-solid fa-check-double"></i>
                </div>

                <h2 class="auth-panel__title-success">Password Reset Complete!</h2>
                <p class="auth-panel__description">Your password has been successfully updated. You can now log in with your new password.</p>

                <div style="width: 100%; max-width: 340px;">
                    <a href="{% url 'users:login' %}" class="btn-submit" style="display: block; text-align: center; text-decoration: none;">
                        <i class="fa-solid fa-right-to-bracket" style="margin-right: 6px;"></i> Go to Login
                    </a>
                </div>

                <p class="auth-panel__support-text">
                    Need help? <a href="#" class="auth-panel__support-link">Contact Support</a>
                </p>
            </div>
        </div>
    </main>
</div>
{% endblock %}

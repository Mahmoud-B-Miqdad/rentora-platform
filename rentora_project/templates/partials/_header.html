{% load static %}
<header class="site-header" id="site-header">
    <div class="container header-inner">

        <a href="{% url 'listings:home' %}" class="header-brand">
            <div class="header-brand__icon" aria-hidden="true">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </div>
            <span class="header-brand__name">Rent<span>ora</span></span>
        </a>

        <nav class="header-nav" aria-label="Main navigation">
            <div class="header-nav__pills">
                <a href="{% url 'listings:home' %}" class="header-nav__link">Home</a>
                <a href="{% url 'listings:browse' %}" class="header-nav__link">Browse Tools</a>
                <a href="{% url 'listings:about' %}" class="header-nav__link">About Us</a>
            </div>
        </nav>

        <div class="header-actions">
            
            <a href="{% url 'listings:tools:add_tool' %}" class="btn-list-tool">
                <i class="fa-solid fa-plus" aria-hidden="true"></i>
                <span>List Your Tool</span>
            </a>

            <span class="header-divider" aria-hidden="true"></span>

            <a href="{% url 'listings:wishlist' %}" class="navbar__wishlist-link" title="My Wishlist">
                <div class="wishlist-icon-wrapper">
                    <i class="fa-regular fa-heart"></i>
                    {% if global_wishlist_count > 0 %}
                        <span class="wishlist-counter">{{ global_wishlist_count }}</span>
                    {% endif %}
                </div>
            </a>

            <a href="{% url 'listings:dashboard' %}" class="header-icon-btn" title="Dashboard" aria-label="Dashboard">
                <i class="fa-solid fa-border-all" aria-hidden="true"></i>
            </a>

            {% if request.session.user_id %}
                <a href="{% url 'users:profile' %}" class="header-icon-btn" title="Profile" aria-label="Your profile">
                    <i class="fa-regular fa-user" aria-hidden="true"></i>
                </a>
                <a href="{% url 'users:logout' %}" class="header-icon-btn" title="Log out" aria-label="Log out">
                    <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
                </a>
            {% else %}
                <a href="{% url 'users:login' %}" class="header-icon-btn" title="Sign in" aria-label="Sign in">
                    <i class="fa-regular fa-user" aria-hidden="true"></i>
                </a>
            {% endif %}
        </div>

    </div>
</header>

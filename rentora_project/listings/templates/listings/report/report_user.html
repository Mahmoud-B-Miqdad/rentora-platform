
{% extends "base.html" %}
{% load static %}{% block extra_css %}
<link rel="stylesheet" href="{% static 'listings/css/report/report.css' %}">
{% endblock %}
{% block content %}
<div class="container report-page">
    <h5 class="report-title">
        <i class="fa-solid fa-triangle-exclamation"></i>
        Report {{ profile_user.name }}
    </h5>
    <form method="POST" action="{% url 'listings:report_user' profile_user.id %}">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Reason</label>
            <select name="reason" class="form-select" required>
                <option value="">Select a reason</option>
                <option value="scam">Scam / Fraud</option>
                <option value="fake">Fake Listing</option>
                <option value="no_show">No Show</option>
                <option value="damage">Property Damage</option>
                <option value="harassment">Harassment</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Additional Details (optional)</label>
            <textarea name="details" class="form-textarea" rows="3" placeholder="Describe what happened"></textarea>
        </div>
        <div class="report-actions">
            <button type="submit" class="btn-submit-report">
                <i class="fa-solid fa-paper-plane"></i> Submit Report
            </button>
            <a href="{% url 'users:profile_user' profile_user.id %}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
